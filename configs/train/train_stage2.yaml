# ============================================================
# 实验一：SatVideoIRSDT 红外卫星视频超分，Stage-2 仅双三次上采样 + ControlNet 扩散
# 启动（单卡，默认卡0；要换卡在前面加 CUDA_VISIBLE_DEVICES=1）：
#   export LD_LIBRARY_PATH=$(find /usr/local/lib/python3.10/dist-packages/ -type d -name "lib" -path "*/nvidia*" 2>/dev/null | tr '\n' ':')${LD_LIBRARY_PATH} && python3 -m accelerate.commands.accelerate_cli launch --num_processes=1 train_stage2.py --config configs/train/train_stage2.yaml
# 断点续训（将 train.resume 改为 checkpoint 路径后，运行同上命令）：
#   # 如：resume: /mnt/massive/zxw/diffbir-InfraredSR/exps/satvideo_irsr_stage2/checkpoints/05000.pt
# ============================================================
model:
  cldm:
    target: diffbir.model.cldm.ControlLDM
    params:
      latent_scale_factor: 0.18215
      unet_cfg:
        use_checkpoint: True
        image_size: 32 # unused
        in_channels: 4
        out_channels: 4
        model_channels: 320
        attention_resolutions: [ 4, 2, 1 ]
        num_res_blocks: 2
        channel_mult: [ 1, 2, 4, 4 ]
        num_head_channels: 64 # need to fix for flash-attn
        use_spatial_transformer: True
        use_linear_in_transformer: True
        transformer_depth: 1
        context_dim: 1024
        legacy: False
      vae_cfg:
        embed_dim: 4
        ddconfig:
          double_z: true
          z_channels: 4
          resolution: 256
          in_channels: 3
          out_ch: 3
          ch: 128
          ch_mult:
          - 1
          - 2
          - 4
          - 4
          num_res_blocks: 2
          attn_resolutions: []
          dropout: 0.0
      clip_cfg:
        embed_dim: 1024
        vision_cfg:
          image_size: 224
          layers: 32
          width: 1280
          head_width: 80
          patch_size: 14
        text_cfg:
          context_length: 77
          vocab_size: 49408
          width: 1024
          heads: 16
          layers: 24
        layer: "penultimate"
      controlnet_cfg:
        use_checkpoint: True
        image_size: 32 # unused
        in_channels: 4
        hint_channels: 4
        model_channels: 320
        attention_resolutions: [ 4, 2, 1 ]
        num_res_blocks: 2
        channel_mult: [ 1, 2, 4, 4 ]
        num_head_channels: 64 # need to fix for flash-attn
        use_spatial_transformer: True
        use_linear_in_transformer: True
        transformer_depth: 1
        context_dim: 1024
        legacy: False

  diffusion:
    target: diffbir.model.gaussian_diffusion.Diffusion
    params:
      linear_start: 0.00085
      linear_end: 0.0120
      timesteps: 1000
      zero_snr: False
      parameterization: eps

dataset:
  train:
    target: diffbir.dataset.satvideo_irsr.SatVideoIRSDTDataset
    params:
      data_root: /mnt/massive/zxw/datasets/SatVideoIRSDT-redistributed
      split: train
      patch_size: 256
      use_augment: True

batch_transform:
  target: diffbir.dataset.batch_transform.IdentityBatchTransform

train:
  # pretrained sd v2.1 path
  sd_path: /mnt/massive/zxw/diffbir-InfraredSR/weights/v2-1_512-ema-pruned.ckpt
  # experiment directory path
  exp_dir: /mnt/massive/zxw/diffbir-InfraredSR/exps/satvideo_irsr_stage2
  # No stage-1 SwinIR — bicubic upsampling is used as the condition.
  learning_rate: 1e-4
  # 1154 images, batch_size=256 → ~4.5 steps/epoch
  # 6.9G/24G (bs=2) → 可撑到 bs=16 左右
  batch_size: 16
  num_workers: 0
  train_steps: 30000
  log_every: 50
  ckpt_every: 5000
  image_every: 1000
  resume: ~
  noise_aug_timestep: 0
